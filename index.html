<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jessica Brinegar — Software Developer</title>
  <meta name="description" content="Jessica Brinegar — Software developer based in Santa Fe, NM. Background in healthcare, academia, and data analysis." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Palette tokens (sage + cream default) — overridden by Tweaks */
      --bg:        #EFE9DD;
      --bg-2:      #E6DFCE;
      --ink:       #2B2A26;
      --ink-2:     #4A4842;
      --ink-3:     #7A7568;
      --rule:      rgba(43,42,38,.14);
      --accent:    #7A8B6F;
      --accent-2:  #5C6E54;
      --paper:     #F6F1E4;

      /* Type — three swappable systems */
      --f-display: "Newsreader", ui-serif, Georgia, serif;
      --f-body:    "Newsreader", ui-serif, Georgia, serif;
      --f-mono:    "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;

      /* Density */
      --sp:        1rem;
      --sec-y:     clamp(96px, 14vw, 180px);
      --gut:       clamp(20px, 4vw, 56px);
      --max:       1240px;

      --t-fast:    180ms cubic-bezier(.2,.7,.2,1);
      --t-med:     420ms cubic-bezier(.2,.7,.2,1);
    }

    [data-vibe="quiet"]{
      --f-display: "JetBrains Mono", ui-monospace, monospace;
      --f-body:    "DM Sans", ui-sans-serif, system-ui, sans-serif;
    }
    [data-vibe="warm"]{
      --f-display: "DM Sans", ui-sans-serif, system-ui, sans-serif;
      --f-body:    "DM Sans", ui-sans-serif, system-ui, sans-serif;
    }

    [data-density="compact"]{
      --sec-y: clamp(60px, 8vw, 110px);
      --gut:   clamp(14px, 3vw, 36px);
    }
    [data-density="airy"]{
      --sec-y: clamp(120px, 18vw, 240px);
      --gut:   clamp(28px, 5vw, 72px);
    }

    [data-dark="true"]{
      --bg:     #1B1B18;
      --bg-2:   #232220;
      --ink:    #ECE7D9;
      --ink-2:  #C8C2B0;
      --ink-3:  #948D7B;
      --rule:   rgba(236,231,217,.14);
      --paper:  #232220;
      --accent: #A0B395;
      --accent-2:#7A8B6F;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:var(--f-body);
      font-size:17px;
      line-height:1.55;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-feature-settings:"kern","liga","calt";
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    /* Selection */
    ::selection{background:var(--accent);color:var(--paper)}

    /* Grain overlay for warmth */
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
      background-image: radial-gradient(rgba(43,42,38,.025) 1px, transparent 1px);
      background-size: 3px 3px; mix-blend-mode: multiply; opacity:.6;
    }
    [data-dark="true"] body::before{ mix-blend-mode: screen; opacity:.3 }

    /* Mount */
    #root{position:relative;z-index:2}

    /* Generic */
    .container{max-width:var(--max);margin:0 auto;padding:0 var(--gut) 0 max(var(--gut), 88px)}
    @media (max-width: 720px){
      .container{padding:0 var(--gut)}
      .rail-nav{display:none !important}
    }

    /* Section eyebrow */
    .eyebrow{
      font-family:var(--f-mono);
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--ink-3);
      display:flex;align-items:center;gap:14px;
      margin-bottom:36px;
    }
    .eyebrow .num{
      display:inline-block;min-width:28px;
      color:var(--accent-2);
    }
    .eyebrow .bar{
      flex:1;height:1px;background:var(--rule);
    }

    /* Headings */
    h1,h2,h3,h4{font-family:var(--f-display); font-weight:400; letter-spacing:-.01em; margin:0; line-height:1.05}
    h1{font-size:clamp(48px, 9vw, 128px); line-height:.98; letter-spacing:-.025em}
    h2{font-size:clamp(34px, 5vw, 64px); letter-spacing:-.018em}
    h3{font-size:clamp(22px, 2.4vw, 32px)}
    [data-vibe="quiet"] h1{ letter-spacing:-.03em; font-weight:500 }
    [data-vibe="warm"] h1{ font-weight:600; letter-spacing:-.035em }

    /* Reveal animation */
    .reveal{opacity:0; transform:translateY(20px); transition:opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1)}
    .reveal.in{opacity:1; transform:none}
    .reveal.d1{transition-delay:.08s} .reveal.d2{transition-delay:.16s} .reveal.d3{transition-delay:.24s} .reveal.d4{transition-delay:.32s}

    /* Scrollbar */
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-thumb{background:var(--ink-3);border-radius:10px;border:2px solid var(--bg)}
    ::-webkit-scrollbar-track{background:var(--bg)}
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
